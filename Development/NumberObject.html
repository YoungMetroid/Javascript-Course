<!DOCTYPE html>

<html lang = "en">

    <head>
        <meta charset="utf-8" />
        <title>Javascript Numbers</title>
       
    </head>

    <body>
        <h3 id = "header3">Javascript Numbers</h3>
        <p id = "p1"></p>  
        <script>
            let p1 = document.getElementById('p1');
            let num1 = 0b101;
            let num2 = 47e2;
            let num3 = '3';
            let num4 = 4;
            let num5 = '8.56';
            let num6 = num3 * '3';
            p1.innerHTML = `${num1} <br/> ${num2} <br/> ${num3} <br/> 
            ${num4} <br/> ${num5}  <br/> ${num6}  <br/>`;

            p1.innerHTML += `Max Value: ${Number.MAX_VALUE} <br/> 
                Parsing string 8.56 to int value:${Number.parseInt(num5)}`;
        </script>


    </body>

</html>
